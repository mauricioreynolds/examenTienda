<div class="card shadow-sm border-0">
  <div class="card-header bg-primary text-white py-3">
    <h4 class="mb-0"><i class="bi bi-tags-fill me-2"></i>Gestión de Categorías</h4>
  </div>
  
  <div class="card-body p-4">
    <div class="row g-2 mb-4 align-items-end">
      <div class="col-md-8">
        <label class="form-label fw-bold">Nombre de la Categoría</label>
        <input 
          type="text" 
          class="form-control form-control-lg" 
          [(ngModel)]="nombre" 
          placeholder="Ej. Electrónicos, Ropa, Hogar..."
        >
      </div>
      <div class="col-md-4">
        <button class="btn btn-success btn-lg w-100" (click)="guardar()">
          {{ idEditando ? 'Actualizar Categoría' : 'Agregar Nueva' }}
        </button>
      </div>
    </div>

    <hr>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th style="width: 10%">ID</th>
            <th style="width: 60%">Nombre</th>
            <th style="width: 30%" class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of lista">
            <td><span class="badge bg-secondary">#{{ c.id }}</span></td>
            <td class="fw-medium">{{ c.nombre }}</td>
            <td class="text-center">
              <button class="btn btn-outline-warning btn-sm me-2" (click)="prepararEdit(c)">
                <i class="bi bi-pencil"></i> Editar
              </button>
              <button class="btn btn-outline-danger btn-sm" (click)="eliminar(c.id)">
                <i class="bi bi-trash"></i> Borrar
              </button>
            </td>
          </tr>
          <tr *ngIf="lista.length === 0">
            <td colspan="3" class="text-center text-muted py-4">
              No hay categorías registradas en la base de datos local.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
