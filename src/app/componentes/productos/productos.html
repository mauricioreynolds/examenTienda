<div class="card shadow border-0 mb-4">
  <div class="card-body">
    <h4 class="text-primary border-bottom pb-2">Nuevo Producto</h4>
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" [(ngModel)]="prod.nombre">
      </div>
      <div class="col-md-3">
        <label class="form-label">Precio (Bs)</label>
        <input type="number" class="form-control" [(ngModel)]="prod.precio">
      </div>
      <div class="col-md-3">
        <label class="form-label">Categoría</label>
        <select class="form-select" [(ngModel)]="prod.idCat">
          <option value="">Seleccione...</option>
          <option *ngFor="let c of listaCats" [value]="c.id">{{c.nombre}}</option>
        </select>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-dark w-100" (click)="guardar()">Registrar</button>
      </div>
    </div>
  </div>
</div>

<div class="table-responsive shadow-sm rounded">
  <table class="table table-striped table-bordered mb-0">
    <thead class="table-primary text-white">
      <tr>
        <th>Producto</th>
        <th>Precio</th>
        <th>Categoría</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of listaProds">
        <td>{{ p.nombre }}</td>
        <td>{{ p.precio }} Bs</td>
        <td><span class="badge bg-info text-dark">{{ obtenerCat(p.idCat) }}</span></td>
        <td>
          <button class="btn btn-sm btn-outline-warning me-2" (click)="editar(p)">✏️</button>
          <button class="btn btn-sm btn-outline-danger" (click)="eliminar(p.id)">🗑️</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
