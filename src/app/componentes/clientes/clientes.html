<div class="card shadow border-0 p-4">
  <h3 class="text-success mb-4">Registro de Clientes</h3>
  
  <div class="row g-2 mb-4">
    <div class="col-md-4">
      <input type="text" class="form-control" [(ngModel)]="cliente.nombre" placeholder="Nombre completo">
    </div>
    <div class="col-md-3">
      <input type="text" class="form-control" [(ngModel)]="cliente.nit" placeholder="NIT / CI">
    </div>
    <div class="col-md-3">
      <input type="text" class="form-control" [(ngModel)]="cliente.celular" placeholder="Celular">
    </div>
    <div class="col-md-2">
      <button class="btn btn-primary w-100" (click)="guardar()">Registrar</button>
    </div>
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Cliente</th>
        <th>NIT/CI</th>
        <th>Celular</th>
        <th class="text-end">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of lista">
        <td>{{ c.nombre }}</td>
        <td>{{ c.nit }}</td>
        <td>{{ c.celular }}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-warning me-1" (click)="editar(c)">✏️</button>
          <button class="btn btn-sm btn-outline-danger" (click)="eliminar(c.id)">🗑️</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
